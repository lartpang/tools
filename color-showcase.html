<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中国传统色彩 | Chinese Traditional Colors</title>
    <meta name="description" content="探索中国传统色彩的魅力，展示数百种蕴含文化底蕴的经典颜色">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=Noto+Serif+SC:wght@400;600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0f0f14;
            --bg-secondary: #1a1a24;
            --bg-tertiary: #252532;
            --text-primary: #f5f5f7;
            --text-secondary: #a1a1a6;
            --text-muted: #6e6e73;
            --accent-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --shadow-glow: 0 0 40px rgba(102, 126, 234, 0.15);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            --border-radius: 20px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            line-height: 1.6;
            overflow-x: hidden;
        }

        .bg-gradient {
            position: fixed;
            inset: 0;
            z-index: -1;
            background:
                radial-gradient(ellipse at 20% 20%, rgba(102, 126, 234, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(240, 147, 251, 0.1) 0%, transparent 50%),
                radial-gradient(ellipse at 40% 60%, rgba(118, 75, 162, 0.08) 0%, transparent 40%);
            animation: bgFloat 20s ease-in-out infinite;
        }

        @keyframes bgFloat {

            0%,
            100% {
                transform: scale(1) rotate(0deg);
            }

            50% {
                transform: scale(1.1) rotate(3deg);
            }
        }

        header {
            position: sticky;
            top: 0;
            z-index: 100;
            padding: 1rem 2rem;
            background: rgba(15, 15, 20, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
        }

        .header-content {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: var(--accent-gradient);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            box-shadow: var(--shadow-glow);
        }

        .logo h1 {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.5rem;
            font-weight: 600;
            background: var(--accent-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .stats {
            display: flex;
            gap: 2rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-number {
            font-weight: 600;
            color: var(--text-primary);
            font-size: 1.1rem;
        }

        .data-source {
            font-size: 0.75rem;
            padding: 0.25rem 0.5rem;
            border-radius: 6px;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
        }

        .data-source.remote {
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.3);
        }

        .data-source.embedded {
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.3);
        }

        .controls {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
            align-items: center;
        }

        .search-container {
            position: relative;
            flex: 1;
            min-width: 280px;
            max-width: 500px;
        }

        .search-input {
            width: 100%;
            padding: 0.875rem 1.25rem 0.875rem 3rem;
            font-size: 1rem;
            border: 1px solid var(--glass-border);
            border-radius: 14px;
            background: var(--glass-bg);
            color: var(--text-primary);
            transition: var(--transition-smooth);
            font-family: inherit;
        }

        .search-input:focus {
            outline: none;
            border-color: rgba(102, 126, 234, 0.5);
            box-shadow: 0 0 0 4px rgba(102, 126, 234, 0.1);
        }

        .search-input::placeholder {
            color: var(--text-muted);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .view-toggle {
            display: flex;
            background: var(--glass-bg);
            border-radius: 12px;
            padding: 4px;
            border: 1px solid var(--glass-border);
        }

        .view-btn {
            padding: 0.625rem 1rem;
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            border-radius: 8px;
            transition: var(--transition-smooth);
            font-size: 0.9rem;
            font-family: inherit;
        }

        .view-btn.active {
            background: var(--accent-gradient);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .view-btn:hover:not(.active) {
            background: rgba(255, 255, 255, 0.05);
        }

        .filter-pills {
            display: flex;
            gap: 0.5rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: var(--glass-border) transparent;
        }

        .filter-pills::-webkit-scrollbar {
            height: 6px;
        }

        .filter-pills::-webkit-scrollbar-track {
            background: transparent;
        }

        .filter-pills::-webkit-scrollbar-thumb {
            background: var(--glass-border);
            border-radius: 3px;
        }

        .filter-pill {
            padding: 0.5rem 1rem;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            color: var(--text-secondary);
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition-smooth);
            white-space: nowrap;
            font-family: inherit;
        }

        .filter-pill:hover {
            border-color: rgba(102, 126, 234, 0.5);
            color: var(--text-primary);
        }

        .filter-pill.active {
            background: var(--accent-gradient);
            color: white;
            border-color: transparent;
        }

        main {
            max-width: 1600px;
            margin: 0 auto;
            padding: 2rem;
        }

        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
        }

        .color-grid.masonry {
            display: block;
            column-count: 5;
            column-gap: 1.5rem;
        }

        @media (max-width: 1400px) {
            .color-grid.masonry {
                column-count: 4;
            }
        }

        @media (max-width: 1100px) {
            .color-grid.masonry {
                column-count: 3;
            }
        }

        @media (max-width: 768px) {
            .color-grid.masonry {
                column-count: 2;
            }

            .color-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 1rem;
            }
        }

        @media (max-width: 480px) {
            .color-grid.masonry {
                column-count: 1;
            }
        }

        .color-card {
            background: var(--bg-secondary);
            border-radius: var(--border-radius);
            overflow: hidden;
            transition: var(--transition-smooth);
            cursor: pointer;
            border: 1px solid var(--glass-border);
            position: relative;
        }

        .color-grid.masonry .color-card {
            break-inside: avoid;
            margin-bottom: 1.5rem;
        }

        .color-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-lg);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .color-swatch {
            height: 160px;
            position: relative;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding-bottom: 1rem;
            transition: var(--transition-smooth);
        }

        .color-swatch::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0, 0, 0, 0.5) 0%, transparent 60%);
            opacity: 0;
            transition: var(--transition-smooth);
        }

        .color-card:hover .color-swatch::before {
            opacity: 1;
        }

        .copy-hint {
            position: absolute;
            color: white;
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
        }

        .color-card:hover .copy-hint {
            opacity: 1;
            transform: translateY(0);
        }

        .color-info {
            padding: 1rem 1.25rem;
        }

        .color-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
        }

        .color-pinyin {
            font-size: 0.8rem;
            color: var(--text-muted);
            text-transform: capitalize;
            margin-bottom: 0.75rem;
        }

        .color-values {
            display: flex;
            flex-direction: column;
            gap: 0.375rem;
            font-size: 0.8rem;
            color: var(--text-secondary);
            font-family: 'SF Mono', 'Consolas', monospace;
        }

        .color-value {
            display: flex;
            justify-content: space-between;
            padding: 0.25rem 0;
        }

        .color-value-label {
            color: var(--text-muted);
        }

        .color-grid.list-view {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .color-grid.list-view .color-card {
            display: flex;
            flex-direction: row;
        }

        .color-grid.list-view .color-swatch {
            width: 120px;
            min-width: 120px;
            height: auto;
            min-height: 100px;
            border-radius: var(--border-radius) 0 0 var(--border-radius);
        }

        .color-grid.list-view .color-info {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 2rem;
            padding: 1rem 1.5rem;
        }

        .color-grid.list-view .color-name-group {
            min-width: 150px;
        }

        .color-grid.list-view .color-values {
            flex-direction: row;
            gap: 2rem;
            flex-wrap: wrap;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(10px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-smooth);
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal {
            background: var(--bg-secondary);
            border-radius: 24px;
            max-width: 500px;
            width: 100%;
            overflow: hidden;
            transform: scale(0.9) translateY(20px);
            transition: var(--transition-smooth);
            border: 1px solid var(--glass-border);
            box-shadow: var(--shadow-lg);
        }

        .modal-overlay.active .modal {
            transform: scale(1) translateY(0);
        }

        .modal-swatch {
            height: 200px;
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 1rem;
            right: 1rem;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 0, 0, 0.3);
            border: none;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition-smooth);
            backdrop-filter: blur(10px);
        }

        .modal-close:hover {
            background: rgba(0, 0, 0, 0.5);
            transform: rotate(90deg);
        }

        .modal-content {
            padding: 2rem;
        }

        .modal-name {
            font-family: 'Noto Serif SC', serif;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
        }

        .modal-pinyin {
            color: var(--text-muted);
            font-size: 1rem;
            margin-bottom: 1.5rem;
            text-transform: capitalize;
        }

        .modal-values {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
        }

        .modal-value-item {
            background: var(--glass-bg);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
            transition: var(--transition-smooth);
        }

        .modal-value-item:hover {
            border-color: rgba(102, 126, 234, 0.5);
            background: rgba(102, 126, 234, 0.1);
        }

        .modal-value-item.copied {
            border-color: #22c55e;
            background: rgba(34, 197, 94, 0.1);
        }

        .modal-value-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-bottom: 0.375rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .modal-value-text {
            font-family: 'SF Mono', 'Consolas', monospace;
            font-size: 0.95rem;
            color: var(--text-primary);
        }

        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 1rem 2rem;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            z-index: 2000;
            opacity: 0;
            transition: var(--transition-smooth);
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .toast-icon {
            color: #22c55e;
            font-size: 1.25rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-muted);
        }

        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }

        .empty-state-text {
            font-size: 1.25rem;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 4rem;
        }

        .loading-spinner {
            width: 48px;
            height: 48px;
            border: 3px solid var(--glass-border);
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: var(--accent-gradient);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: var(--transition-smooth);
            box-shadow: var(--shadow-glow);
            z-index: 100;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            transform: translateY(-3px);
        }

        footer {
            text-align: center;
            padding: 3rem 2rem;
            color: var(--text-muted);
            font-size: 0.9rem;
            border-top: 1px solid var(--glass-border);
            margin-top: 4rem;
        }

        footer a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: var(--transition-smooth);
        }

        footer a:hover {
            color: var(--text-primary);
        }

        @media (max-width: 768px) {
            header {
                padding: 1rem;
            }

            .logo h1 {
                font-size: 1.2rem;
            }

            .stats {
                gap: 1rem;
                font-size: 0.8rem;
            }

            .search-container {
                min-width: 100%;
            }

            main {
                padding: 1rem;
            }

            .modal-values {
                grid-template-columns: 1fr;
            }

            .color-grid.list-view .color-info {
                flex-direction: column;
                align-items: flex-start;
                gap: 0.75rem;
            }

            .color-grid.list-view .color-values {
                flex-direction: column;
                gap: 0.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="bg-gradient"></div>

    <header>
        <div class="header-content">
            <div class="header-top">
                <div class="logo">
                    <div class="logo-icon">🎨</div>
                    <h1>中国传统色彩</h1>
                </div>
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-number" id="colorCount">0</span>
                        <span>种颜色</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number" id="displayCount">0</span>
                        <span>当前显示</span>
                    </div>
                    <span class="data-source" id="dataSource">加载中...</span>
                </div>
            </div>
            <div class="controls">
                <div class="search-container">
                    <span class="search-icon">🔍</span>
                    <input type="text" class="search-input" id="searchInput" placeholder="搜索颜色名称、拼音或 HEX 值...">
                </div>
                <div class="view-toggle">
                    <button class="view-btn active" data-view="grid">网格</button>
                    <button class="view-btn" data-view="masonry">瀑布</button>
                    <button class="view-btn" data-view="list">列表</button>
                </div>
            </div>
            <div class="filter-pills" id="filterPills">
                <button class="filter-pill active" data-filter="all">全部</button>
                <button class="filter-pill" data-filter="红">红色系</button>
                <button class="filter-pill" data-filter="黄">黄色系</button>
                <button class="filter-pill" data-filter="绿">绿色系</button>
                <button class="filter-pill" data-filter="蓝">蓝色系</button>
                <button class="filter-pill" data-filter="紫">紫色系</button>
                <button class="filter-pill" data-filter="白">白色系</button>
                <button class="filter-pill" data-filter="灰">灰色系</button>
                <button class="filter-pill" data-filter="黑">黑色系</button>
                <button class="filter-pill" data-filter="青">青色系</button>
                <button class="filter-pill" data-filter="橙">橙色系</button>
                <button class="filter-pill" data-filter="棕">棕色系</button>
            </div>
        </div>
    </header>

    <main>
        <div class="loading" id="loading">
            <div class="loading-spinner"></div>
        </div>
        <div class="color-grid" id="colorGrid"></div>
        <div class="empty-state" id="emptyState" style="display: none;">
            <div class="empty-state-icon">🔍</div>
            <p class="empty-state-text">未找到匹配的颜色</p>
        </div>
    </main>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <div class="modal-swatch" id="modalSwatch">
                <button class="modal-close" id="modalClose">×</button>
            </div>
            <div class="modal-content">
                <h2 class="modal-name" id="modalName"></h2>
                <p class="modal-pinyin" id="modalPinyin"></p>
                <div class="modal-values" id="modalValues"></div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span id="toastMessage">已复制到剪贴板</span>
    </div>

    <button class="scroll-top" id="scrollTop">↑</button>

    <footer>
        <p>🎨 中国传统色彩收集 · 共收录 <span id="footerCount">0</span> 种传统色彩</p>
        <p style="margin-top: 0.5rem; opacity: 0.7;">点击颜色卡片查看详情，点击色值可复制</p>
    </footer>

    <script>
        // ============ 配置区 ============
        // 远程 JSON 路径（相对路径适用于 GitHub Pages 等托管环境）
        const REMOTE_JSON_URL = './colors.json';

        // 内嵌数据作为回退（当远程加载失败时使用）
        // 如需完全自包含，可将完整数据粘贴到此处
        const EMBEDDED_DATA = null; // 设为 null 表示不使用内嵌数据

        // ============ 应用状态 ============
        let colorsData = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let currentView = 'grid';

        // ============ DOM 元素 ============
        const colorGrid = document.getElementById('colorGrid');
        const loading = document.getElementById('loading');
        const emptyState = document.getElementById('emptyState');
        const searchInput = document.getElementById('searchInput');
        const filterPills = document.getElementById('filterPills');
        const viewToggle = document.querySelectorAll('.view-btn');
        const modalOverlay = document.getElementById('modalOverlay');
        const modalClose = document.getElementById('modalClose');
        const scrollTopBtn = document.getElementById('scrollTop');
        const toast = document.getElementById('toast');
        const dataSourceBadge = document.getElementById('dataSource');

        // ============ 工具函数 ============
        function getContrastColor(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return (0.299 * r + 0.587 * g + 0.114 * b) / 255 > 0.5 ? '#1a1a24' : '#ffffff';
        }

        function rgbToString(rgb) { return `rgb(${rgb[0]}, ${rgb[1]}, ${rgb[2]})`; }
        function cmykToString(cmyk) { return `cmyk(${cmyk[0]}%, ${cmyk[1]}%, ${cmyk[2]}%, ${cmyk[3]}%)`; }

        function showToast(message) {
            document.getElementById('toastMessage').textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => showToast(`已复制: ${text}`));
        }

        function updateDataSource(isRemote) {
            dataSourceBadge.textContent = isRemote ? '🌐 远程' : '📦 内嵌';
            dataSourceBadge.className = 'data-source ' + (isRemote ? 'remote' : 'embedded');
        }

        // ============ 颜色卡片创建 ============
        function createColorCard(color) {
            const card = document.createElement('div');
            card.className = 'color-card';
            const textColor = getContrastColor(color.hex);

            card.innerHTML = `
                <div class="color-swatch" style="background-color: ${color.hex};">
                    <span class="copy-hint" style="color: ${textColor};">点击查看详情</span>
                </div>
                <div class="color-info">
                    <div class="color-name-group">
                        <h3 class="color-name">${color.name}</h3>
                        <p class="color-pinyin">${color.pinyin}</p>
                    </div>
                    <div class="color-values">
                        <div class="color-value">
                            <span class="color-value-label">HEX</span>
                            <span>${color.hex.toUpperCase()}</span>
                        </div>
                        <div class="color-value">
                            <span class="color-value-label">RGB</span>
                            <span>${color.RGB.join(', ')}</span>
                        </div>
                    </div>
                </div>
            `;
            card.addEventListener('click', () => openModal(color));
            return card;
        }

        // ============ 渲染颜色 ============
        function renderColors() {
            const filtered = colorsData.filter(color => {
                const matchesSearch = currentSearch === '' ||
                    color.name.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    color.pinyin.toLowerCase().includes(currentSearch.toLowerCase()) ||
                    color.hex.toLowerCase().includes(currentSearch.toLowerCase());
                const matchesFilter = currentFilter === 'all' || color.name.includes(currentFilter);
                return matchesSearch && matchesFilter;
            });

            colorGrid.innerHTML = '';

            if (filtered.length === 0) {
                emptyState.style.display = 'block';
            } else {
                emptyState.style.display = 'none';
                const fragment = document.createDocumentFragment();
                filtered.forEach(color => fragment.appendChild(createColorCard(color)));
                colorGrid.appendChild(fragment);
            }

            document.getElementById('displayCount').textContent = filtered.length;
        }

        // ============ 弹窗功能 ============
        function openModal(color) {
            document.getElementById('modalSwatch').style.backgroundColor = color.hex;
            document.getElementById('modalName').textContent = color.name;
            document.getElementById('modalName').style.color = color.hex;
            document.getElementById('modalPinyin').textContent = color.pinyin;

            const values = [
                { label: 'HEX', value: color.hex.toUpperCase() },
                { label: 'RGB', value: rgbToString(color.RGB) },
                { label: 'CMYK', value: cmykToString(color.CMYK) },
                { label: '拼音', value: color.pinyin }
            ];

            const modalValues = document.getElementById('modalValues');
            modalValues.innerHTML = values.map(v => `
                <div class="modal-value-item" data-value="${v.value}">
                    <div class="modal-value-label">${v.label}</div>
                    <div class="modal-value-text">${v.value}</div>
                </div>
            `).join('');

            modalValues.querySelectorAll('.modal-value-item').forEach(item => {
                item.addEventListener('click', () => {
                    copyToClipboard(item.dataset.value);
                    item.classList.add('copied');
                    setTimeout(() => item.classList.remove('copied'), 1500);
                });
            });

            modalOverlay.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            modalOverlay.classList.remove('active');
            document.body.style.overflow = '';
        }

        // ============ 事件监听 ============
        searchInput.addEventListener('input', (e) => {
            currentSearch = e.target.value;
            renderColors();
        });

        filterPills.addEventListener('click', (e) => {
            if (e.target.classList.contains('filter-pill')) {
                filterPills.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
                e.target.classList.add('active');
                currentFilter = e.target.dataset.filter;
                renderColors();
            }
        });

        viewToggle.forEach(btn => {
            btn.addEventListener('click', () => {
                viewToggle.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentView = btn.dataset.view;
                colorGrid.classList.remove('masonry', 'list-view');
                if (currentView === 'masonry') colorGrid.classList.add('masonry');
                else if (currentView === 'list') colorGrid.classList.add('list-view');
            });
        });

        modalClose.addEventListener('click', closeModal);
        modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

        window.addEventListener('scroll', () => {
            scrollTopBtn.classList.toggle('visible', window.scrollY > 500);
        });

        scrollTopBtn.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });

        // ============ 数据加载（智能模式） ============
        async function loadColors() {
            try {
                // 尝试从远程加载
                const response = await fetch(REMOTE_JSON_URL);
                if (!response.ok) throw new Error('Remote fetch failed');
                colorsData = await response.json();
                updateDataSource(true);
            } catch (error) {
                console.warn('远程加载失败，尝试使用内嵌数据:', error.message);

                if (EMBEDDED_DATA && Array.isArray(EMBEDDED_DATA) && EMBEDDED_DATA.length > 0) {
                    colorsData = EMBEDDED_DATA;
                    updateDataSource(false);
                } else {
                    loading.innerHTML = `
                        <div style="text-align: center; color: var(--text-muted);">
                            <p style="font-size: 1.25rem; margin-bottom: 0.5rem;">⚠️ 加载失败</p>
                            <p>请确保 colors.json 文件与本页面在同一目录</p>
                            <p style="margin-top: 1rem; font-size: 0.85rem;">或者配置 EMBEDDED_DATA 以启用离线模式</p>
                        </div>
                    `;
                    return;
                }
            }

            document.getElementById('colorCount').textContent = colorsData.length;
            document.getElementById('footerCount').textContent = colorsData.length;
            loading.style.display = 'none';
            renderColors();
        }

        // ============ 启动应用 ============
        loadColors();
    </script>
</body>

</html>
